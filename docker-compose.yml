version: "3.9"

services:
  api:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://assistant:assistant@postgres:5432/assistant
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_healthy

  worker:
    build: .
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=INFO
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://assistant:assistant@postgres:5432/assistant
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_healthy

  beat:
    build: .
    command: celery -A app.workers.celery_app.celery_app beat --loglevel=INFO
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://assistant:assistant@postgres:5432/assistant
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: assistant
      POSTGRES_PASSWORD: assistant
      POSTGRES_DB: assistant
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
