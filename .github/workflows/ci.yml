name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: assistant
          POSTGRES_PASSWORD: assistant
          POSTGRES_DB: assistant
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: |
          ruff check app tests

      - name: Type check with mypy
        run: |
          mypy app || true

      - name: Run migrations
        env:
          DATABASE_URL: postgresql+psycopg://assistant:assistant@localhost:5432/assistant
        run: |
          alembic upgrade head

      - name: Run tests
        env:
          DATABASE_URL: postgresql+psycopg://assistant:assistant@localhost:5432/assistant
          REDIS_URL: redis://localhost:6379/0
          GEMINI_API_KEY: test_key
          WHATSAPP_VERIFY_TOKEN: test_token
          WHATSAPP_ACCESS_TOKEN: test_token
          WHATSAPP_PHONE_NUMBER_ID: test_id
          GOOGLE_CALENDAR_CLIENT_ID: test_id
          GOOGLE_CALENDAR_CLIENT_SECRET: test_secret
          EMAIL_INBOUND_SECRET: test_secret
        run: |
          pytest -v --tb=short --cov=app --cov-report=term-missing tests/

  build-image:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v3

      - name: Build Docker image
        run: |
          docker build -t task-assistant:latest .
